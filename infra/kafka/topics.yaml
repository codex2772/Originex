# RESERVED / pre-provisioned — notification-service does not publish via
# outbox yet (confirmed: no OutboxPublisher usage anywhere in the service
# as of Phase 0). Pairs with the commands topic above (commands in, events
# out); reuses "requests" as the noun rather than inventing a new one, and
# keeps the "notifications" (plural) domain label to match its sibling
# above, even though OutboxPoller's routing prefix for this domain is
# singular (originex.notification.*) — that mismatch already existed
# between this file's "notifications" and the domain prefixes used
# elsewhere (e.g. "customer" is singular in both places; "notifications"
# was already plural here before this change), so this follows the
# existing topic's convention rather than introducing a new one.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: originex.notifications.requests.events
  namespace: originex-data
  labels:
    strimzi.io/cluster: originex-kafka
    domain: notifications
spec:
  partitions: 16
  replicas: 3
  config:
    retention.ms: "2592000000"      # 30 days
    cleanup.policy: delete
    compression.type: lz4
    min.insync.replicas: "2"
---
