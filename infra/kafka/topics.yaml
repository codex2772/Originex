# ═══════════════════════════════════════════════════════════════════════════
# Kafka Topic Definitions (Strimzi KafkaTopic CRDs)
# Applied to Kubernetes cluster where Strimzi Kafka operator is installed.
# ═══════════════════════════════════════════════════════════════════════════

# ─── Customer Topics ───
# Actively used today: customer-service publishes here via OutboxPublisher
# (CustomerRegistered, KYCCompleted), and OutboxPoller.resolveTopicFromEventType()
# has always routed originex.customer.* events here — this CRD was simply
# missing. Partitions/retention match the los/payments baseline tier
# (comparable-importance core domain event).
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: originex.customer.customers.events
  namespace: originex-data
  labels:
    strimzi.io/cluster: originex-kafka
    domain: customer
spec:
  partitions: 32
  replicas: 3
  config:
    retention.ms: "2592000000"      # 30 days
    cleanup.policy: delete
    compression.type: lz4
    min.insync.replicas: "2"
---
