# ─── BRE Topics ───
# RESERVED / pre-provisioned — bre-service does not publish via outbox yet
# (confirmed: no OutboxPublisher usage anywhere in bre-service as of Phase 0).
# OutboxPoller.resolveTopicFromEventType() now routes originex.bre.* events
# here so a future publisher lands correctly on day one instead of the
# unrouted-events fallback. Same precedent as the pre-existing "collections"
# topic below, which is provisioned with no collections-service module yet.
# Name/partitions follow the los/lms/ledger naming and sizing convention:
# "evaluations" mirrors EvaluationResult, bre-service's actual aggregate.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: originex.bre.evaluations.events
  namespace: originex-data
  labels:
    strimzi.io/cluster: originex-kafka
    domain: bre
spec:
  partitions: 16
  replicas: 3
  config:
    retention.ms: "2592000000"      # 30 days
    cleanup.policy: delete
    compression.type: lz4
    min.insync.replicas: "2"
---
