# ═══════════════════════════════════════════════════════════════════════════
# Kafka Topic Definitions (Strimzi KafkaTopic CRDs)
# Applied to Kubernetes cluster where Strimzi Kafka operator is installed.
# ═══════════════════════════════════════════════════════════════════════════

# ─── LOS Topics ───
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: originex.los.applications.events
  namespace: originex-data
  labels:
    strimzi.io/cluster: originex-kafka
    domain: los
spec:
  partitions: 32
  replicas: 3
  config:
    retention.ms: "2592000000"      # 30 days
    cleanup.policy: delete
    compression.type: lz4
    min.insync.replicas: "2"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: originex.los.applications.commands
  namespace: originex-data
  labels:
    strimzi.io/cluster: originex-kafka
    domain: los
spec:
  partitions: 32
  replicas: 3
  config:
    retention.ms: "604800000"       # 7 days
    cleanup.policy: delete
    compression.type: lz4
    min.insync.replicas: "2"
---
