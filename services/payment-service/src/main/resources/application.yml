spring:
  application:
    name: payment-service
  # RLS canary #2 of the Phase 2 rollout, after customer-service and ledger.
  # "rls" is additive — it composes with any environment profile supplied at
  # launch (e.g. SPRING_PROFILES_ACTIVE=prod → prod,rls) — and loads
  # application-rls.yml from the starter, which routes the runtime path through
  # originex_app (NOBYPASSRLS) and Flyway through originex_owner. See
  # dev/RLS_ENABLEMENT.md. The originex_app/system/owner roles and the pgcrypto
  # extension must exist in the target database before boot, or the service fails
  # loud at connection time (by design): locally via
  # dev/init-scripts/init-databases.sql, elsewhere via DBA/IaC provisioning.
  profiles:
    include: rls
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/originex_payment
    username: originex
    password: originex_local
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: payment-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer
      properties:
        enable.idempotence: true

server:
  port: 8086
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db

originex:
  tenant:
    header-name: X-Tenant-Id
    enforce: true
  partner:
    mode: SANDBOX   # LIVE for production
  payment:
    retry-interval-ms: 300000  # 5 minutes between retry polls
  rail:
    rtgs-threshold: 200000    # >= 2 lakhs → RTGS
    imps-max: 500000          # up to 5 lakhs → IMPS

resilience4j:
  circuitbreaker:
    instances:
      neftRail:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
      rtgsRail:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
      impsRail:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
      nachRail:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s

logging:
  level:
    com.originex: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{traceId:-}] [%X{tenantId:-}] %-5level %logger{36} - %msg%n"
