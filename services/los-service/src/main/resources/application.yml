spring:
  application:
    name: los-service
  # RLS canary #3 of the Phase 2 rollout, after customer-service, ledger and
  # payment. "rls" is additive — it composes with any environment profile supplied
  # at launch (e.g. SPRING_PROFILES_ACTIVE=prod → prod,rls) — and loads
  # application-rls.yml from the starter, which routes the runtime path through
  # originex_app (NOBYPASSRLS) and Flyway through originex_owner. See
  # dev/RLS_ENABLEMENT.md. The originex_app/system/owner roles and the pgcrypto
  # extension must exist in the target database before boot, or the service fails
  # loud at connection time (by design): locally via
  # dev/init-scripts/init-databases.sql, elsewhere via DBA/IaC provisioning.
  profiles:
    include: rls
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/originex_los
    username: originex
    password: originex_local
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: los-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis

originex:
  tenant:
    header-name: X-Tenant-Id
    enforce: true
  customer-service:
    base-url: http://localhost:8081
  partner-integration-service:
    base-url: http://localhost:8085
  bre-service:
    base-url: http://localhost:8088

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      customerService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      partnerIntegrationBureau:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
      breService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      customerService:
        max-attempts: 3
        wait-duration: 500ms
      partnerIntegrationBureau:
        max-attempts: 2
        wait-duration: 1s
      breService:
        max-attempts: 2
        wait-duration: 1s

logging:
  level:
    com.originex: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{traceId:-}] [%X{tenantId:-}] %-5level %logger{36} - %msg%n"
