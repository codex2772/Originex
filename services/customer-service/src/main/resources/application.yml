spring:
  application:
    name: customer-service
  # RLS canary (Phase 2). customer-service is the first service to run under
  # row-level security. "rls" is additive — it composes with any environment
  # profile supplied at launch (e.g. SPRING_PROFILES_ACTIVE=prod → prod,rls) —
  # and loads application-rls.yml from the starter, which routes the runtime
  # path through originex_app (NOBYPASSRLS) and Flyway through originex_owner.
  # See dev/RLS_ENABLEMENT.md. The originex_app/system/owner roles and the
  # pgcrypto extension must exist in the target database before boot, or the
  # service fails loud at connection time (by design): locally via
  # dev/init-scripts/init-databases.sql, elsewhere via DBA/IaC provisioning.
  profiles:
    include: rls
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/originex_customer
    username: originex
    password: originex_local
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: customer-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: all
      properties:
        enable.idempotence: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis

originex:
  tenant:
    header-name: X-Tenant-Id
    enforce: true
  partner-integration-service:
    base-url: http://localhost:8085

resilience4j:
  circuitbreaker:
    instances:
      partnerIntegrationPan:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      partnerIntegrationAadhaar:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      partnerIntegrationBank:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      partnerIntegrationPan:
        max-attempts: 2
        wait-duration: 500ms
      partnerIntegrationAadhaar:
        max-attempts: 2
        wait-duration: 500ms
      partnerIntegrationBank:
        max-attempts: 2
        wait-duration: 500ms

logging:
  level:
    com.originex: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{traceId:-}] [%X{tenantId:-}] %-5level %logger{36} - %msg%n"
