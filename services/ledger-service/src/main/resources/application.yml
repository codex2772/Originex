spring:
  application:
    name: ledger-service
  # RLS canary #1 of the Phase 2 rollout, after customer-service. "rls" is
  # additive — it composes with any environment profile supplied at launch
  # (e.g. SPRING_PROFILES_ACTIVE=prod → prod,rls) — and loads application-rls.yml
  # from the starter, which routes the runtime path through originex_app
  # (NOBYPASSRLS) and Flyway through originex_owner. See dev/RLS_ENABLEMENT.md.
  # The originex_app/system/owner roles and the pgcrypto extension must exist in
  # the target database before boot, or the service fails loud at connection time
  # (by design): locally via dev/init-scripts/init-databases.sql, elsewhere via
  # DBA/IaC provisioning.
  profiles:
    include: rls
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/originex_ledger
    username: originex
    password: originex_local
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      pool-name: ledger-service-pool

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      properties:
        enable.idempotence: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

server:
  port: 8084
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis

originex:
  tenant:
    header-name: X-Tenant-Id
    enforce: true

logging:
  level:
    com.originex: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] [%X{traceId:-}] [%X{tenantId:-}] %-5level %logger{36} - %msg%n"
