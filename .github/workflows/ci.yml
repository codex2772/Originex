# ═══════════════════════════════════════════════════════════════════════════
# CI workflow for the full platform (runs on PRs and main branch)
# ═══════════════════════════════════════════════════════════════════════════
name: Platform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build all modules (compile + unit tests)
        run: mvn -B clean verify -DskipITs=true

      - name: Integration tests (with Testcontainers)
        run: mvn -B verify -Pintegration-test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/target/surefire-reports/*.xml"
