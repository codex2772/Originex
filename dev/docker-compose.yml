version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════
# Originex Local Development Stack
# Usage: docker compose -f dev/docker-compose.yml up -d
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: originex-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: originex
      POSTGRES_PASSWORD: originex_local
      POSTGRES_DB: originex_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U originex"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Apache Kafka (KRaft mode — no ZooKeeper) ───────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: originex-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ─── Confluent Schema Registry ──────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: originex-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      # Host port moved to 8090 to avoid colliding with customer-service
      # (server.port: 8081) — container keeps listening on 8081 internally,
      # unchanged, so Docker-internal traffic (e.g. kafka-ui's
      # KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081) is unaffected.
      - "8090:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 (Cluster-compatible single node for dev) ───────────────
  redis:
    image: redis:7-alpine
    container_name: originex-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Kafka UI (development visibility) ──────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: originex-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: originex-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081

volumes:
  postgres_data:
  kafka_data:
  redis_data:
